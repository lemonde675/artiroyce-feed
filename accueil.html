<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArtiRoyce – Accueil</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--red:#e63224;--green:#27a945;}

html,body{
height:100%;
font-family:'Segoe UI',Arial,sans-serif;
background:#000;
max-width:480px;
margin:0 auto;
overflow:hidden;
}

/* HEADER */
.top-header{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:480px;
background:#fff;
z-index:100;
}

/* FEED */
.feed-wrap{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:480px;
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
padding-top:100px;
padding-bottom:80px;
}

/* CARD */
.vcard{
height:100vh;
scroll-snap-align:start;
position:relative;
display:flex;
align-items:flex-end;
}

.vcard-bg{position:absolute;inset:0;}
.vcard-overlay{
position:absolute;inset:0;
background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.8));
}

/* ACTIONS DROITE FIX */
.actions-r{
position:fixed;
top:50%;
transform:translateY(-50%);
right:calc((100% - 480px)/2 + 10px);
display:flex;
flex-direction:column;
gap:8px;
z-index:50;
}

@media(max-width:480px){
.actions-r{right:10px;}
}

/* BOUTONS */
.act-circle{
width:38px;height:38px;
border-radius:50%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
}

/* INFOS BAS */
.info-bot{
position:absolute;
left:12px;
right:80px;
bottom:80px;
color:#fff;
}

/* BUTTONS */
.btn-disc{
background:var(--green);
color:#fff;
border:none;
padding:10px 16px;
border-radius:20px;
font-weight:700;
}

.btn-lv{
background:var(--red);
color:#fff;
border:none;
padding:10px 16px;
border-radius:20px;
font-weight:700;
}

/* BOTTOM NAV */
.bot-nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:480px;
background:#fff;
display:flex;
z-index:100;
}

.nav-i{
flex:1;
text-align:center;
padding:8px;
font-size:12px;
}

.nav-plus{
width:50px;height:50px;
background:var(--red);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:22px;
margin-top:-20px;
}

/* TOAST */
.toast{
position:fixed;
top:100px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:8px 15px;
border-radius:20px;
opacity:0;
}
.toast.show{opacity:1;}

</style>
</head>

<body>

<header class="top-header">
<div style="padding:10px;font-weight:bold;text-align:center;">
ArtiRoyce
</div>
</header>

<div class="feed-wrap">

<!-- CARD -->
<div class="vcard">
<div class="vcard-bg" style="background:linear-gradient(#0a3d1f,#000);"></div>
<div class="vcard-overlay"></div>

<div class="actions-r">
<div class="act-circle">👍</div>
<div class="act-circle">💬</div>
<div class="act-circle">📥</div>
<div class="act-circle">🔗</div>
</div>

<div class="info-bot">
<h3>Professionnel</h3>
<p>@amariella</p>

<button class="btn-disc">Discussion</button>
<button class="btn-lv">+ Live</button>
</div>

</div>

</div>

<nav class="bot-nav">
<div class="nav-i">Discussion</div>
<div class="nav-i">Messages</div>
<div class="nav-i"><div class="nav-plus">+</div></div>
<div class="nav-i">Live</div>
<div class="nav-i">FAQ</div>
</nav>

<div class="toast" id="toast"></div>

<script>
function toast(msg){
const t=document.getElementById('toast');
t.innerText=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}
</script>

</body>
</html>
