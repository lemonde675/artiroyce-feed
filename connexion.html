<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBS_6CJN7Fu50pMu98sjuRxQetUcLu9l9w",
  authDomain: "artiroyce-f42e4.firebaseapp.com",
  projectId: "artiroyce-f42e4",
  storageBucket: "artiroyce-f42e4.appspot.com", // 🔥 CORRIGÉ
  messagingSenderId: "588140774605",
  appId: "1:588140774605:web:b69cf8740c2fe5f1d59584"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// 👁️ afficher mot de passe
window.togglePass = function() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
};

// 🔔 toast
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ✅ validation email
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email.trim());
}

// 🚀 LOGIN
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const email    = document.getElementById('email');
  const password = document.getElementById('password');
  const emailErr = document.getElementById('emailError');
  const passErr  = document.getElementById('passwordError');
  const btn      = document.getElementById('btnLogin');

  emailErr.textContent = '';
  passErr.textContent = '';
  email.className = '';
  password.className = '';

  let valid = true;

  if (!email.value.trim()) {
    emailErr.textContent = '⚠ Entrez votre email';
    email.className = 'error';
    valid = false;
  } else if (!validateEmail(email.value)) {
    emailErr.textContent = '⚠ Email invalide';
    email.className = 'error';
    valid = false;
  } else {
    email.className = 'valid';
  }

  if (!password.value.trim()) {
    passErr.textContent = '⚠ Entrez votre mot de passe';
    password.className = 'error';
    valid = false;
  } else {
    password.className = 'valid';
  }

  if (!valid) return;

  btn.disabled = true;
  btn.textContent = 'Connexion...';

  try {
    console.log("Tentative login:", email.value);

    // 🔐 AUTH
    const userCredential = await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value
    );

    console.log("SUCCESS LOGIN", userCredential.user);

    const uid = userCredential.user.uid;

    // 📦 FIRESTORE
    const userDoc = await getDoc(doc(db, 'utilisateurs', uid));

    if (!userDoc.exists()) {
      showToast('✅ Connexion réussie', 'success');
      setTimeout(() => window.location.href = 'accueil.html', 1200);
      return;
    }

    const statut = userDoc.data().statut || 'en_attente';

    if (statut === 'verifie') {
      showToast('✅ Bienvenue', 'success');
      setTimeout(() => window.location.href = 'accueil.html', 1200);
    } else {
      showToast('⏳ En attente', 'warning');
      setTimeout(() => window.location.href = 'profil.html', 1200);
    }

  } catch (err) {
    console.error("🔥 ERREUR FIREBASE:", err.code, err.message);

    btn.disabled = false;
    btn.textContent = 'CONNEXION →';

    // ✅ MESSAGE RÉEL
    showToast(err.code + " | " + err.message, 'error-toast');
  }
});
</script>
