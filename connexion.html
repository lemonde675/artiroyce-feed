<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtiRoyce – Connexion</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f0f0; font-family: Arial; }

    .card {
      background: #fff;
      border-radius: 10px;
      width: 350px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    h1 { margin-bottom: 15px; }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e63224;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="card">
  <h1>Connexion</h1>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Mot de passe" required />
    <button type="submit">Connexion</button>
  </form>
</div>

<!-- FIREBASE (VERSION STABLE MOBILE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBS_6CJN7Fu50pMu98sjuRxQetUcLu9l9w",
  authDomain: "artiroyce-f42e4.firebaseapp.com",
  projectId: "artiroyce-f42e4",
  storageBucket: "artiroyce-f42e4.appspot.com",
  messagingSenderId: "588140774605",
  appId: "1:588140774605:web:b69cf8740c2fe5f1d59584"
};

// INIT
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// LOGIN
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  auth.signInWithEmailAndPassword(email, password)
    .then(async (userCredential) => {
      const uid = userCredential.user.uid;

      const docRef = db.collection('utilisateurs').doc(uid);
      const docSnap = await docRef.get();

      if (!docSnap.exists) {
        showToast("Connexion OK");
        setTimeout(() => window.location.href = "accueil.html", 1000);
        return;
      }

      const statut = docSnap.data().statut || "en_attente";

      if (statut === "verifie") {
        showToast("Bienvenue !");
        setTimeout(() => window.location.href = "accueil.html", 1000);
      } else {
        showToast("Compte en attente");
        setTimeout(() => window.location.href = "profil.html", 1000);
      }
    })
    .catch((error) => {
      console.log(error);
      showToast(error.code + " | " + error.message);
    });
});
</script>

</body>
</html>
