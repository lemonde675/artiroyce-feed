<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtiRoyce – Administration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; }

    /* ── LOGIN ── */
    #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 100px; }
    .login-card { background: #fff; border-radius: 12px; overflow: hidden; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.13); }
    .top-bar, .bottom-bar { height: 10px; background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%); }
    .login-body { padding: 36px 32px 32px; }
    .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text .arti { color: #e63224; }
    .logo-text .royce { color: #27a945; }
    .admin-badge { text-align: center; margin-bottom: 24px; }
    .admin-badge h1 { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
    .admin-badge p { font-size: 13px; color: #888; }
    .admin-badge .admin-name { font-size: 13px; color: #27a945; font-weight: 700; margin-top: 4px; }
    .admin-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #e63224, #27a945); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 26px; }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: #333; margin-bottom: 6px; }
    .input-wrap { position: relative; margin-bottom: 20px; }
    input[type="password"], input[type="text"] { width: 100%; padding: 12px 44px 12px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 15px; color: #333; outline: none; background: #fafafa; transition: border-color 0.2s; }
    input:focus { border-color: #e63224; background: #fff; }
    input.error { border-color: #e63224; background: #fff5f5; }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888; display: flex; align-items: center; }
    .btn-admin { width: 100%; padding: 13px; background: #e63224; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
    .btn-admin:hover { background: #c42a1e; }
    .btn-admin:disabled { background: #ccc; cursor: not-allowed; }
    .err-login { font-size: 12px; color: #e63224; text-align: center; min-height: 18px; margin-bottom: 10px; }

    /* ── PANEL ── */
    #adminPanel { display: none; }
    .header { background: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 15px; font-weight: 800; color: #1a1a1a; }
    .header-subtitle { font-size: 11px; color: #888; }
    .btn-logout { background: none; border: 1.5px solid #e63224; color: #e63224; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { background: #e63224; color: #fff; }
    .panel-body { padding: 20px; max-width: 900px; margin: 0 auto; }

    /* Stats */
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 120px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid #ddd; }
    .stat-card.orange { border-left-color: #ff9800; }
    .stat-card.green  { border-left-color: #27a945; }
    .stat-card.red    { border-left-color: #e63224; }
    .stat-card.blue   { border-left-color: #2196f3; }
    .stat-num { font-size: 28px; font-weight: 800; color: #1a1a1a; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: #e8e8e8; color: #555; transition: all 0.2s; }
    .tab.active { background: #e63224; color: #fff; }

    /* Table */
    .table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden; }
    .table-header { padding: 14px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 14px; font-weight: 800; color: #1a1a1a; }
    .refresh-btn { background: none; border: 1.5px solid #27a945; color: #27a945; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { background: #27a945; color: #fff; }
    .user-row { padding: 14px 20px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: #fafafa; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #e63224, #27a945); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 800; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 160px; }
    .user-name  { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .user-email { font-size: 12px; color: #888; }
    .user-tel   { font-size: 12px; color: #555; }
    .user-date  { font-size: 11px; color: #aaa; margin-top: 2px; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-badge.en_attente { background: #fff3cd; color: #856404; }
    .status-badge.verifie    { background: #d1fae5; color: #065f46; }
    .status-badge.rejete     { background: #fee2e2; color: #991b1b; }
    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-voir    { background: #2196f3; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-voir:hover { opacity: 0.85; }
    .btn-valider { background: #27a945; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-valider:hover { opacity: 0.85; }
    .btn-rejeter { background: #e63224; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-rejeter:hover { opacity: 0.85; }
    .empty-state { padding: 40px 20px; text-align: center; color: #aaa; font-size: 14px; }
    .loading { padding: 30px; text-align: center; color: #888; font-size: 13px; }

    /* ══════════════════════════════════
       ── MODALE DOSSIER KYC COMPLÈTE ──
    ══════════════════════════════════ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; align-items: flex-start; justify-content: center; padding: 16px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; overflow: hidden; width: 100%; max-width: 520px; box-shadow: 0 8px 48px rgba(0,0,0,0.25); animation: modalIn 0.22s ease; margin: auto; }
    @keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    .modal-topbar { height: 8px; background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%); }
    .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 800; color: #1a1a1a; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: #888; line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: #e63224; }
    .modal-body { padding: 0; }

    /* Sections dans la modale */
    .modal-section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-section:last-child { border-bottom: none; }
    .modal-section-title {
      font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      color: #888; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .modal-section-title span { font-size: 15px; }

    /* Profil artisan dans modale */
    .modal-profile-row { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
    .modal-avatar { width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, #e63224, #27a945); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; font-weight: 800; flex-shrink: 0; }
    .modal-user-name { font-size: 18px; font-weight: 800; color: #1a1a1a; }
    .modal-user-sub  { font-size: 12px; color: #888; margin-top: 2px; }

    /* Grid infos */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-item { background: #f8f8f8; border-radius: 8px; padding: 10px 12px; }
    .info-item-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; color: #aaa; text-transform: uppercase; margin-bottom: 3px; }
    .info-item-val { font-size: 13px; color: #333; font-weight: 600; word-break: break-all; }

    /* Grille photos KYC */
    .kyc-docs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kyc-doc-item { border-radius: 10px; overflow: hidden; background: #f5f5f5; }
    .kyc-doc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: #555; text-transform: uppercase; padding: 8px 10px 4px; }
    .kyc-doc-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      display: block; cursor: pointer; transition: opacity 0.2s;
    }
    .kyc-doc-img:hover { opacity: 0.85; }
    .kyc-doc-no-file { padding: 20px; text-align: center; color: #bbb; font-size: 12px; }
    .kyc-doc-open {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 10px; background: #e8f4fd; color: #2196f3;
      font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none;
    }

    /* Raison rejet dans modale */
    .rejet-section { margin-bottom: 16px; }
    .rejet-section label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: #e63224; text-transform: uppercase; margin-bottom: 6px; }
    .rejet-section textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #f5c6cb; border-radius: 8px; font-size: 13px; color: #333; resize: vertical; min-height: 90px; background: #fff5f5; font-family: 'Segoe UI', Arial, sans-serif; }
    .rejet-section textarea:focus { border-color: #e63224; outline: none; }

    /* Raison existante */
    .raison-affichee { background: #fff0f0; border: 1.5px solid #f5c6cb; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; }
    .raison-affichee-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; color: #e63224; text-transform: uppercase; margin-bottom: 4px; }
    .raison-affichee-text { font-size: 13px; color: #555; line-height: 1.5; }

    /* Boutons actions modale */
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 20px; background: #fafafa; border-top: 1px solid #eee; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .modal-actions button:hover { opacity: 0.85; }
    .btn-modal-valider  { background: #27a945; color: #fff; }
    .btn-modal-rejeter  { background: #e63224; color: #fff; }
    .btn-modal-revoquer { background: #ff9800; color: #fff; }
    .btn-modal-reactiver{ background: #2196f3; color: #fff; }
    .btn-modal-cancel   { background: #f0f0f0 !important; color: #555 !important; border: 1.5px solid #ddd !important; }

    /* Viewer image plein écran */
    .img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 900; display: none; align-items: center; justify-content: center; }
    .img-viewer.open { display: flex; }
    .img-viewer img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
    .img-viewer-close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 28px; cursor: pointer; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

    /* Badge KYC statut */
    .kyc-status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .kyc-status-badge.non_soumis { background: #f5f5f5; color: #888; }
    .kyc-status-badge.en_attente { background: #fff3cd; color: #856404; }
    .kyc-status-badge.verifie    { background: #d1fae5; color: #065f46; }
    .kyc-status-badge.rejete     { background: #fee2e2; color: #991b1b; }

    /* Toast */
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.success { background: #27a945; }
    .toast.error-toast { background: #e63224; }

    @media (max-width: 500px) {
      .stats-row { gap: 8px; }
      .user-row { padding: 12px 14px; }
      .panel-body { padding: 14px; }
      .info-grid { grid-template-columns: 1fr; }
      .kyc-docs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── IMAGE VIEWER PLEIN ÉCRAN ── -->
<div class="img-viewer" id="imgViewer" onclick="closeViewer()">
  <button class="img-viewer-close" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="" alt=""/>
</div>

<!-- ══════════════════════════════════

══════════════════════════════════ -->

  <div class="header">

      <svg width="36" height="26" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
