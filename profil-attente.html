<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtiRoyce – Profil en attente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.13);
    }
    .top-bar {
      height: 10px;
      background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
    }
    .card-body { padding: 36px 28px 32px; }

    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
    }
    .logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text .arti  { color: #e63224; }
    .logo-text .royce { color: #27a945; }

    /* Avatar utilisateur */
    .user-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .user-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e63224, #27a945);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 28px; font-weight: 800;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .user-name {
      text-align: center;
      font-size: 20px; font-weight: 800; color: #1a1a1a;
      margin-bottom: 4px;
    }
    .user-email {
      text-align: center;
      font-size: 13px; color: #888;
      margin-bottom: 24px;
    }

    /* Bandeau statut */
    .status-banner {
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .status-banner.en_attente {
      background: #fff8e1;
      border: 1.5px solid #ffcc02;
    }
    .status-banner.rejete {
      background: #fff0f0;
      border: 1.5px solid #e63224;
    }
    .status-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
    .status-content {}
    .status-title {
      font-size: 15px; font-weight: 800; margin-bottom: 4px;
    }
    .status-banner.en_attente .status-title { color: #856404; }
    .status-banner.rejete .status-title { color: #c0392b; }
    .status-desc {
      font-size: 13px; line-height: 1.5;
    }
    .status-banner.en_attente .status-desc { color: #6d4c00; }
    .status-banner.rejete .status-desc { color: #7a1e1e; }

    /* Raison du rejet */
    .rejet-box {
      background: #fff5f5;
      border: 1.5px solid #f5c6cb;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .rejet-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      color: #e63224; margin-bottom: 6px;
      text-transform: uppercase;
    }
    .rejet-text {
      font-size: 14px; color: #333; line-height: 1.5;
    }

    /* Étapes */
    .steps-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
      color: #888; text-transform: uppercase; margin-bottom: 12px;
    }
    .steps { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: #fafafa; border-radius: 8px;
      border: 1px solid #eee;
    }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .step-num.done   { background: #27a945; color: #fff; }
    .step-num.active { background: #ff9800; color: #fff; }
    .step-num.todo   { background: #e0e0e0; color: #888; }
    .step-text { font-size: 13px; color: #555; }
    .step-text strong { color: #1a1a1a; }

    /* Infos */
    .info-row {
      display: flex; align-items: center; gap: 10px;
      background: #f0f9f2; border-radius: 8px;
      padding: 12px 14px; margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }
    .info-row svg { color: #27a945; flex-shrink: 0; }
    .info-row span { font-size: 13px; color: #2d6a4f; line-height: 1.4; }

    /* Boutons */
    .btn-logout {
      width: 100%; padding: 13px;
      background: none; color: #e63224;
      border: 1.5px solid #e63224; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: #e63224; color: #fff; }

    .bottom-bar {
      height: 10px;
      background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
    }

    .loading-state {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }

    .date-info {
      text-align: center;
      font-size: 12px; color: #aaa;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top-bar"></div>
    <div class="card-body">

      <div class="logo-wrap">
        <svg width="64" height="46" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
          <path fill="#e02010" fill-rule="evenodd" d="M 90,55 L 68,17 L 24,17 L 2,55 L 24,93 L 68,93 Z M 71,55 L 59,34 L 33,34 L 21,55 L 33,76 L 59,76 Z"/>
          <path fill="#27a945" fill-rule="evenodd" d="M 142,55 L 120,17 L 76,17 L 54,55 L 76,93 L 120,93 Z M 123,55 L 111,34 L 87,34 L 75,55 L 87,76 L 111,76 Z"/>
          <polygon points="68,17 90,55 75,55 87,34" fill="white"/>
          <path fill="#e02010" d="M 68,17 L 90,55 L 71,55 L 59,34 Z"/>
          <polygon points="76,93 54,55 75,55 87,76" fill="white"/>
          <path fill="#27a945" d="M 76,93 L 54,55 L 75,55 L 87,76 Z"/>
        </svg>
        <div class="logo-text"><span class="arti">Arti</span><span class="royce">Royce</span></div>
      </div>

      <!-- Contenu dynamique -->
      <div id="mainContent">
        <div class="loading-state">⏳ Chargement de votre profil…</div>
      </div>

      <button class="btn-logout" onclick="deconnexion()">Se déconnecter</button>

    </div>
    <div class="bottom-bar"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBS_6CJN7Fu50pMu98sjuRxQetUcLu9l9w",
      authDomain: "artiroyce-f42e4.firebaseapp.com",
      projectId: "artiroyce-f42e4",
      storageBucket: "artiroyce-f42e4.firebasestorage.app",
      messagingSenderId: "588140774605",
      appId: "1:588140774605:web:b69cf8740c2fe5f1d59584",
      measurementId: "G-X4XLHDJCE7"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    window.deconnexion = async function() {
      await signOut(auth);
      window.location.href = 'connexion.html';
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'connexion.html';
        return;
      }

      try {
        const userDoc = await getDoc(doc(db, 'utilisateurs', user.uid));
        if (!userDoc.exists()) {
          window.location.href = 'connexion.html';
          return;
        }

        const data   = userDoc.data();
        const statut = data.statut || 'en_attente';

        // Si l'artisan est validé → rediriger vers accueil
        if (statut === 'verifie') {
          window.location.href = 'accueil.html';
          return;
        }

        const prenom = data.prenom || '';
        const nom    = data.nom    || '';
        const email  = data.email  || user.email || '';
        const initiale = (prenom || nom || '?')[0].toUpperCase();
        const dateInscription = data.dateInscription?.toDate
          ? data.dateInscription.toDate().toLocaleDateString('fr-FR')
          : '—';

        let html = '';

        // Avatar + nom
        html += `
          <div class="user-avatar-wrap">
            <div class="user-avatar">${initiale}</div>
          </div>
          <div class="user-name">${prenom} ${nom}</div>
          <div class="user-email">${email}</div>
          <div class="date-info">Inscrit le ${dateInscription}</div>
        `;

        if (statut === 'en_attente') {
          html += `
            <div class="status-banner en_attente">
              <div class="status-icon">⏳</div>
              <div class="status-content">
                <div class="status-title">Profil en cours de validation</div>
                <div class="status-desc">Notre équipe examine votre dossier. La vérification KYC prend généralement 24 à 48 heures.</div>
              </div>
            </div>

            <div class="steps-title">Progression</div>
            <div class="steps">
              <div class="step">
                <div class="step-num done">✓</div>
                <div class="step-text"><strong>Inscription complétée</strong><br>Votre compte a été créé avec succès.</div>
              </div>
              <div class="step">
                <div class="step-num active">2</div>
                <div class="step-text"><strong>Vérification en cours</strong><br>L'équipe ArtiRoyce examine vos informations.</div>
              </div>
              <div class="step">
                <div class="step-num todo">3</div>
                <div class="step-text"><strong>Accès au profil complet</strong><br>Vous pourrez accéder à toutes les fonctionnalités.</div>
              </div>
            </div>

            <div class="info-row">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>Vous recevrez une notification par email dès que votre compte sera validé.</span>
            </div>
          `;
        } else if (statut === 'rejete') {
          const raisonRejet = data.raisonRejet || 'Aucune raison précisée.';

          html += `
            <div class="status-banner rejete">
              <div class="status-icon">❌</div>
              <div class="status-content">
                <div class="status-title">Votre demande a été rejetée</div>
                <div class="status-desc">Votre inscription n'a pas été validée par notre équipe.</div>
              </div>
            </div>

            <div class="rejet-box">
              <div class="rejet-label">📋 Raison du rejet</div>
              <div class="rejet-text">${raisonRejet}</div>
            </div>

            <div class="info-row">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <span>Contactez notre équipe à <strong>support@artiroyce.com</strong> pour plus d'informations ou pour soumettre une nouvelle demande.</span>
            </div>
          `;
        }

        document.getElementById('mainContent').innerHTML = html;

      } catch (err) {
        document.getElementById('mainContent').innerHTML = `
          <div class="loading-state">⚠ Erreur de chargement. <a href="connexion.html" style="color:#e63224">Reconnectez-vous</a></div>
        `;
      }
    });
  </script>
</body>
</html>
