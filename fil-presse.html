<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Fil Presse — ArtiRoyce</title>
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<style>
:root{--red:#e63224;--green:#27a945;--bg:#F2F4F7}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg)}
.body-wrap{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;background:var(--bg)}
.spacer{flex-shrink:0}
.top-header{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.th-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 4px}
.th-logo{font-size:22px;font-weight:900;line-height:1;letter-spacing:-0.5px}
.th-logo .a{color:var(--red)}.th-logo .r{color:var(--green)}
.lang-sel{display:flex;align-items:center;gap:4px;background:#F2F4F7;border-radius:20px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #E8ECF0}
.h-icons{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-bar{display:none;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #eee}
.search-bar.show{display:flex}
.search-bar input{flex:1;border:1px solid #E8ECF0;border-radius:20px;padding:9px 14px;font-size:13.5px;background:#F2F4F7;color:#222}
.search-close{font-size:16px;color:#999;cursor:pointer;padding:4px 6px;flex-shrink:0}
.cover-carousel-wrap{background:#fff;padding:14px 0 16px;border-bottom:8px solid var(--bg)}
.cover-carousel-title{font-size:15px;font-weight:800;color:#222;padding:0 14px 10px}
.cover-carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:0 14px 4px;scrollbar-width:none}
.cover-carousel::-webkit-scrollbar{display:none}
.cover-card{position:relative;flex:0 0 auto;width:130px;height:160px;border-radius:14px;overflow:hidden;scroll-snap-align:start;background:#ddd;cursor:pointer}
.cover-card img{width:100%;height:100%;object-fit:cover;display:block}
.cover-card-overlay{position:absolute;left:0;right:0;bottom:0;padding:10px 10px 8px;background:linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0))}
.cover-card-journal{color:#fff;font-size:12.5px;font-weight:800;margin-bottom:2px}
.cover-card-txt{color:#eee;font-size:10.5px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.h-ico{position:relative;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
.h-ico.bell{background:#fff8e1;border:2px solid #ffc107}
.h-ico.chat{background:#e8f5e9;border:2px solid var(--green)}
.h-ico.chat .bdot{background:var(--green)}
.h-ico .bdot{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff}

.composer{background:#fff;flex-shrink:0;border-bottom:1px solid #eee}
.composer-row{display:flex;align-items:center;gap:10px;padding:12px 14px}
.search-circle-btn{width:40px;height:40px;border-radius:50%;background:#F2F4F7;border:1px solid #E8ECF0;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0}
.search-circle-btn:active{background:#E8ECF0}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.av-wrap{position:relative;flex-shrink:0}
.online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2.5px solid #fff}
.v-icon{position:absolute;top:-1px;right:-1px;width:16px;height:16px;border-radius:50%;background:var(--green);border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:900}
.composer-input{flex:1;background:#F2F4F7;border-radius:22px;padding:10px 16px;font-size:14px;color:#777;border:none;cursor:pointer}
.composer-locked{font-size:12px;color:#999;text-align:center;padding:8px 14px 12px}

.content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.sec-title{font-size:12.5px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.5px;padding:14px 16px 6px;background:var(--bg)}
.trash-toggle{margin:0 14px 8px;background:#fff;border:1px solid #E8ECF0;border-radius:16px;padding:10px 14px;font-size:13px;font-weight:700;color:#e63224;display:flex;align-items:center;justify-content:space-between;cursor:pointer}

.post{background:#fff;margin-bottom:8px}
.post-hd{display:flex;align-items:center;gap:10px;padding:14px 14px 6px}
.post-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.post-name{font-size:14.5px;font-weight:800;color:#222}
.badge-metier{background:#F2F4F7;border-radius:12px;padding:2px 9px;font-size:11.5px;font-weight:700;color:#555;display:inline-flex;align-items:center;gap:3px}
.badge-off{background:var(--green);color:#fff;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:800}
.post-sub{font-size:12px;color:#999;margin-top:1px}
.post-txt{padding:2px 14px 10px;font-size:15.5px;color:#050505;line-height:1.35;font-weight:400}
.post-txt-feature{margin:2px 14px 10px;border-radius:16px;padding:28px 18px;text-align:center;color:#fff}
.ptf-type{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;opacity:.85;margin-bottom:8px}
.ptf-journal{font-size:16.5px;font-weight:800;margin-bottom:10px}
.ptf-txt{font-size:16.5px;font-weight:600;line-height:1.4}
.post-imgs{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.post-imgs{display:grid;gap:4px;margin:0 14px 10px;border-radius:14px;overflow:hidden;background:#eee}
.post-imgs img{width:100%;object-fit:cover;display:block;background:#eee}
.post-stats{display:flex;justify-content:space-between;padding:9px 14px;font-size:12.5px;color:#999}
.post-actions{display:flex;border-top:1px solid #f2f2f2}
.pa-btn{flex:1;text-align:center;padding:11px 4px;font-size:12.5px;font-weight:700;color:#777;cursor:pointer}
.post-trash-actions{display:flex;gap:8px;padding:0 14px 12px}
.pt-btn{flex:1;text-align:center;background:#F2F4F7;color:#444;padding:8px;border-radius:12px;font-size:11.5px;font-weight:700;cursor:pointer;touch-action:manipulation}
.empty-msg{text-align:center;color:#aaa;font-size:13px;padding:30px 20px}
.type-chip{border:1.5px solid #E8ECF0;border-radius:14px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#555;cursor:pointer}
.type-chip.active{color:#fff;border-color:transparent}
.ribbon-wrap{text-align:center;margin-bottom:8px}
.ribbon{display:inline-flex;align-items:center;gap:5px;color:#fff;font-size:11.5px;font-weight:800;padding:5px 16px;border-radius:20px}
.ribbon-journal{display:block;font-size:15px;font-weight:800;color:#222;margin-top:4px}
.follow-btn{border:1.5px solid var(--red);color:var(--red);background:#fff;border-radius:14px;padding:4px 12px;font-size:12px;font-weight:800;cursor:pointer;margin-left:8px;flex-shrink:0}
.follow-btn.on{background:#eee;color:#777;border-color:#eee}
.own-actions{display:flex;gap:8px;margin:0 14px 10px}
.oa-btn{flex:1;text-align:center;background:#F2F4F7;border-radius:12px;padding:8px;font-size:11.5px;font-weight:700;color:#444;cursor:pointer;touch-action:manipulation}
.composer-notice{display:none;margin-top:10px;border-radius:12px;padding:9px 12px;font-size:12.5px;font-weight:600;line-height:1.4}
.upload-progress-wrap{display:none;margin-top:10px;background:#F2F4F7;border-radius:6px;height:6px;overflow:hidden}
.upload-progress-bar{height:100%;width:0%;background:var(--green);border-radius:6px;transition:width .15s}
.react-picker{display:none;gap:6px;padding:8px 12px;border-top:1px solid #f2f2f2;background:#fafafa}
.react-picker.show{display:flex}
.react-em{font-size:22px;cursor:pointer;transition:transform .1s}
.react-em:active{transform:scale(1.3)}
.comments-box{display:none;padding:10px 14px;border-top:1px solid #f2f2f2;background:#fafafa}
.comments-box.show{display:block}
.cmt-item{display:flex;gap:8px;margin-bottom:8px}
.cmt-av{width:28px;height:28px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#666;flex-shrink:0}
.cmt-bubble{background:#fff;border-radius:12px;padding:7px 10px;font-size:12.5px;flex:1}
.cmt-bubble b{font-size:12px}
.cmt-input-row{display:flex;gap:8px;margin-top:6px}
.cmt-input{flex:1;border:1px solid #E8ECF0;border-radius:14px;padding:8px 12px;font-size:13px}
.cmt-send{background:var(--red);color:#fff;border:none;border-radius:14px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>

<script>
function majVh(){
  const h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  document.documentElement.style.setProperty('--vh',(h*0.01)+'px');
}
majVh();
window.addEventListener('resize',majVh);
if(window.visualViewport){window.visualViewport.addEventListener('resize',majVh);window.visualViewport.addEventListener('scroll',majVh);}

function adj(){const hh=document.getElementById('topH').offsetHeight;document.getElementById('spacer').style.height=hh+'px'}
window.addEventListener('load',adj);window.addEventListener('resize',adj);setTimeout(adj,100);

// Même correctif que discussion_v1.html : calcule directement la vraie hauteur du
// header FIXE du shell parent (accueil.html) quand cette page est en iframe, pour
// ne jamais cacher le composeur/le contenu dessous. Ne dépend d'aucun message
// (accueil.html n'en envoie pas) : le calcul est direct et sans risque.
function getEmbedTopOffsetPx(){
  try {
    if (window.parent && window.parent !== window && window.parent.document) {
      const parentTop = window.parent.document.getElementById('topH');
      if (parentTop) return parentTop.getBoundingClientRect().height;
    }
  } catch(e) {}
  return 0;
}
let embedTopOffsetPx = 0;
function appliquerDecalage(){
  document.querySelector('.body-wrap').style.paddingTop = embedTopOffsetPx + 'px';
}
embedTopOffsetPx = getEmbedTopOffsetPx();
appliquerDecalage();
window.addEventListener('load', ()=>{ embedTopOffsetPx = getEmbedTopOffsetPx(); appliquerDecalage(); });
window.addEventListener('resize', ()=>{ embedTopOffsetPx = getEmbedTopOffsetPx(); appliquerDecalage(); });
setTimeout(()=>{ embedTopOffsetPx = getEmbedTopOffsetPx(); appliquerDecalage(); }, 300);

function hideEmbeddedChrome(){
  const th=document.getElementById('topH');
  if(th) th.style.setProperty('display','none','important');
  const sp=document.getElementById('spacer');
  if(sp) sp.style.setProperty('height','0px','important');
}
window.addEventListener('message',(e)=>{
  if(e.data && e.data.type==='parentFrame') hideEmbeddedChrome();
});
</script>

const FIFTEEN_DAYS_MS = 15*24*60*60*1000;
let currentUid = null;

function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.max(0, Date.now()-d.getTime());
  const h = Math.floor(diff/3600000);
  if(h<1) return "à l'instant";
  if(h<24) return 'il y a '+h+'h';
  const j = Math.floor(h/24);
  if(j<30) return 'il y a '+j+'j';
  return 'il y a '+Math.floor(j/30)+' mois';
}

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderPost(id, p, opts){
  opts = opts || {};
  const mine = !!opts.mine, trashed = !!opts.trashed;
  const initiale = (p.prenom||'?')[0].toUpperCase();
  const avatar = p.photoAvatar ? ('<img src="'+p.photoAvatar+'">') : initiale;
  const officialBadge = p.official ? '<span class="badge-off">✔ Presse Officielle</span>' : '';
  const metierBadge = (!p.official && p.metier) ? ('<span class="badge-metier">'+esc(p.metier)+'</span>') : '';
  const typeColors = {actu:'#27a945',lancement:'#0288d1',partenariat:'#8e44ad',innovation:'#e63224'};
  const typeGradients = {
    actu:'linear-gradient(135deg,#34c759,#1d8a37)',
    lancement:'linear-gradient(135deg,#2ea3e6,#01578f)',
    partenariat:'linear-gradient(135deg,#a75cc9,#5a2a6e)',
    innovation:'linear-gradient(135deg,#f0645a,#a01f14)'
  };
  const typeLabels = {actu:'📰 Journal',lancement:'🚀 Lancement',partenariat:'🤝 Partenariat',innovation:'💡 Innovation'};
  const journalSuffix = p.journalNom ? ('<span class="ribbon-journal">'+esc(p.journalNom)+'</span>') : '';
  const ribbon = p.type ? ('<div class="ribbon-wrap"><div class="ribbon" style="background:'+(typeColors[p.type]||'#999')+'">'+(typeLabels[p.type]||p.type)+'</div>'+journalSuffix+'</div>') : '';
  const roleLbl = p.official ? '' : (p.roleLbl || 'Professionnel');
  const imgList = (p.images||[]).slice(0,4);
  const imgCount = imgList.length;
  const imgsGridCols = imgCount <= 1 ? '1fr' : '1fr 1fr';
  const imgs = imgList.map(function(u){
    const sizing = imgCount === 1 ? 'aspect-ratio:4/5;max-height:520px;' : 'height:170px;';
    return '<img src="'+esc(u)+'" loading="lazy" referrerpolicy="no-referrer" style="'+sizing+'object-fit:cover">';
  }).join('');
  const video = p.videoUrl ? ('<video src="'+esc(p.videoUrl)+'" controls style="width:calc(100% - 28px);display:block;background:#000;max-height:320px;border-radius:14px;margin:0 14px 10px"></video>') : '';

    '<div class="pt-btn" onclick="window.__restore(\''+id+'\')">↩ Restaurer</div>'+
    '<div class="pt-btn" onclick="window.__hardDelete(\''+id+'\', this)">🗑 Supprimer définitivement</div>'+
    '</div>') : '';

  // Sans photo ni vidéo, on donne à la publication une belle carte dégradée

  const hasMedia = imgCount > 0 || !!p.videoUrl;

  return '<div class="post" id="post-'+id+'">'

    +     '<div class="post-sub">'+(trashed?'🗑 Supprimé — ':'')+(roleLbl?roleLbl+' · ':'')+timeAgo(p.createdAt)+'</div>'

    + txtBlock
    + (imgs ? ('<div class="post-imgs" style="grid-template-columns:'+imgsGridCols+'">'+imgs+'</div>') : '')

        '<div class="post-stats" id="stats-'+id+'"><span>'+(p.likes||0)+' réaction(s)</span><span>'+(p.comments||0)+' commentaire(s)</span></div>'

      + '</div>'

let allMineActive = [];
let allOthers = [];
let searchTerm = '';

function matchesSearch(p){
  if(!searchTerm) return true;
  const hay = ((p.journalNom||'') + ' ' + (p.prenom||'') + ' ' + (p.texte||'')).toLowerCase();
  return hay.indexOf(searchTerm) !== -1;
}

function renderFilteredFeed(){
  const mineFiltered = allMineActive.filter(function(x){ return matchesSearch(x[1]); });
  const othersFiltered = allOthers.filter(function(x){ return matchesSearch(x[1]); });

  document.getElementById('mineList').innerHTML = mineFiltered.map(function(x){return renderPost(x[0],x[1],{mine:true});}).join('');
  document.getElementById('secMineTitle').style.display = mineFiltered.length ? '' : 'none';

  const carouselBlock = buildCoverCarouselBlock();
  let feedHTML = '';
  if(othersFiltered.length){
    othersFiltered.forEach(function(x, i){
      feedHTML += renderPost(x[0], x[1], {mine:false});
      if(carouselBlock && (i + 1) % 10 === 0) feedHTML += carouselBlock;
    });
  } else {
    feedHTML = '<div class="empty-msg">'+(searchTerm ? 'Aucun résultat pour « '+esc(searchTerm)+' ».' : 'Aucune publication pour le moment.')+'</div>';
  }
  document.getElementById('feedList').innerHTML = feedHTML;

  markFollowedButtons();
  markAuthorsOnline();
  mineFiltered.concat(othersFiltered).forEach(function(x){ refreshReactionCount(x[0]); });
}

// Auto-défilement partagé : fait avancer TOUTES les instances de carrousel
// présentes dans le fil (il peut y en avoir plusieurs, une toutes les 10 pubs).
// Se met en pause dès qu'on touche l'une d'entre elles.
let coverPausedUntil = 0;

setInterval(function(){
  if(Date.now() < coverPausedUntil) return;
  document.querySelectorAll('.cover-carousel').forEach(function(track){
    const maxScroll = track.scrollWidth - track.clientWidth;
    if(maxScroll <= 2) return;
    if(track.scrollLeft >= maxScroll - 2){
      track.scrollTo({ left: 0, behavior: 'smooth' });
    } else {
      track.scrollTo({ left: track.scrollLeft + 160, behavior: 'smooth' });
    }
  });
}, 3000);

document.getElementById('content').addEventListener('touchstart', function(e){
  if(e.target.closest('.cover-carousel')) coverPausedUntil = Date.now() + 4000;
}, { passive: true });
document.getElementById('content').addEventListener('mousedown', function(e){
  if(e.target.closest('.cover-carousel')) coverPausedUntil = Date.now() + 4000;
});

window.__scrollToPost = function(id){
  const el = document.getElementById('post-' + id);
  if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

// Construit un bloc "Nos parutions" (publications illustrées récentes), destiné
// à être inséré directement dans le fil, comme les suggestions Facebook.
function buildCoverCarouselBlock(){
  const combined = allMineActive.concat(allOthers)
    .filter(function(x){ return (x[1].images || []).length > 0; })
    .slice(0, 12);
  if(!combined.length) return '';

  const cards = combined.map(function(x){
    const id = x[0], p = x[1];
    const journal = esc(p.journalNom || p.prenom || 'ArtiRoyce');
    const snippet = esc((p.texte || '').slice(0, 55));
    return '<div class="cover-card" onclick="window.__scrollToPost(\'' + id + '\')">'
      + '<img src="' + esc(p.images[0]) + '" loading="lazy" referrerpolicy="no-referrer">'
      + '<div class="cover-card-overlay"><div class="cover-card-journal">' + journal + '</div><div class="cover-card-txt">' + snippet + '</div></div>'
      + '</div>';
  }).join('');

  return '<div class="cover-carousel-wrap">'
    + '<div class="cover-carousel-title">📰 Nos parutions</div>'
    + '<div class="cover-carousel">' + cards + '</div>'
    + '</div>';
}

async function loadFeed(){
  try{
    const col = collection(db, 'fil_presse');
    const snap = await getDocs(query(col, orderBy('createdAt','desc')));

    const mineActive = [];
    const others = [];
    const mineTrashed = [];
    const now = Date.now();

    snap.forEach(function(d){
      const p = d.data();
      const isMine = currentUid && p.uid === currentUid;
      const isDeleted = !!p.deletedAt;

      if(isDeleted){
        if(isMine){
          const delTime = p.deletedAt.toDate ? p.deletedAt.toDate().getTime() : new Date(p.deletedAt).getTime();
          if(now - delTime > FIFTEEN_DAYS_MS){
            deleteDoc(doc(db,'fil_presse', d.id)).catch(function(){});
          } else {
            mineTrashed.push([d.id, p]);
          }
        }
        return;
      }
      if(isMine) mineActive.push([d.id, p]);
      else others.push([d.id, p]);
    });

    allMineActive = mineActive;
    allOthers = others;
    renderFilteredFeed();

    const trashToggle = document.getElementById('trashToggle');
    const trashCount = document.getElementById('trashCount');
    const trashList = document.getElementById('trashList');
    trashCount.textContent = mineTrashed.length;
    trashToggle.style.display = mineTrashed.length ? 'flex' : 'none';
    trashList.innerHTML = mineTrashed.map(function(x){return renderPost(x[0],x[1],{mine:true, trashed:true});}).join('');
  }catch(err){
    console.error('Fil Presse — chargement impossible :', err);
    document.getElementById('feedList').innerHTML =
      '<div class="empty-msg">⚠️ Impossible de charger le Fil Presse pour le moment.<br>'
      + '(Vérifie que Firebase Blaze est bien actif sur le projet.)</div>';
  }
}

async function markAuthorsOnline(){
  const dots = document.querySelectorAll('.online-dot[data-author]');
  const uids = [...new Set(Array.from(dots).map(d=>d.dataset.author).filter(Boolean))];
  for(const uid of uids){
    if(uid === 'artiroyce_presse') continue;
    try{
      const uSnap = await getDoc(doc(db,'utilisateurs', uid));
      if(!uSnap.exists()) continue;
      const da = uSnap.data().derniereActivite;
      if(!da) continue;
      const t = da.toDate ? da.toDate().getTime() : new Date(da).getTime();
      if(Date.now() - t < 120000){
        document.querySelectorAll('.online-dot[data-author="'+uid+'"]').forEach(d=>d.style.display='');
      }
    }catch(e){}
  }
}

// Un premier clic demande confirmation (le libellé change pendant 3s) ; un second
// clic dans ce délai déplace réellement la publication en corbeille.
window.__softDelete = async function(id, el){
  if(el && el.dataset.confirm !== 'yes'){
    el.dataset.confirm = 'yes';
    const original = el.textContent;
    el.textContent = '✅ Confirmer : mettre à la corbeille';
    setTimeout(function(){
      if(el.dataset.confirm === 'yes'){ el.dataset.confirm = ''; el.textContent = original; }
    }, 3000);
    return;
  }
  if(el) el.dataset.confirm = '';
  await updateDoc(doc(db,'fil_presse', id), { deletedAt: serverTimestamp() });
  loadFeed();
}
window.__restore = async function(id){
  await updateDoc(doc(db,'fil_presse', id), { deletedAt: null });
  loadFeed();
}
window.__hardDelete = async function(id, el){
  if(el && el.dataset.confirm !== 'yes'){
    el.dataset.confirm = 'yes';
    const original = el.textContent;
    el.textContent = '✅ Confirmer la suppression définitive';
    setTimeout(function(){
      if(el.dataset.confirm === 'yes'){ el.dataset.confirm = ''; el.textContent = original; }
    }, 3000);
    return;
  }
  if(el) el.dataset.confirm = '';
  await deleteDoc(doc(db,'fil_presse', id));
  loadFeed();
}

// Redimensionne et compresse une image côté client avant de l'encoder en base64.
// Évite toute dépendance à Firebase Storage pour les photos (indépendant de Blaze).
function resizeImageToBase64(file, maxDim, quality){
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onerror = function(){ reject(new Error("Lecture de l'image impossible")); };
    reader.onload = function(){
      const img = new Image();
      img.onerror = function(){ reject(new Error('Fichier image invalide')); };
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// Upload vidéo avec vraie progression (uploadBytesResumable) + garde-fou temporel :
// si Storage ne répond pas (Blaze inactif), on abandonne proprement après 45s
// au lieu de rester bloqué, et la publication continue sans vidéo.
function uploaderVideo(file, btnEl){
  return new Promise(function(resolve, reject){
    const path = 'fil_presse/' + currentUid + '_' + Date.now() + '_' + file.name;
    const r = ref(storage, path);
    const task = uploadBytesResumable(r, file);
    const progressWrap = document.getElementById('uploadProgressWrap');
    const progressBar = document.getElementById('uploadProgressBar');
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';
    const failSafe = setTimeout(function(){ try{ task.cancel(); }catch(e){} }, 45000);
    task.on('state_changed', function(snap){
      const pct = snap.totalBytes ? Math.round((snap.bytesTransferred / snap.totalBytes) * 100) : 0;
      progressBar.style.width = pct + '%';
      if(btnEl) btnEl.textContent = 'Envoi vidéo… ' + pct + '%';
    }, function(err){
      clearTimeout(failSafe);
      progressWrap.style.display = 'none';
      reject(err);
    }, function(){
      clearTimeout(failSafe);
      progressWrap.style.display = 'none';
      getDownloadURL(task.snapshot.ref).then(resolve).catch(reject);
    });
  });
}

      e.target.value = '';
      return;
    }
    selectedVideoFile = f; selectedPhotoBase64 = null;

    document.getElementById('vidPreview').src = url;
    document.getElementById('vidPreview').style.display = 'block';
    document.getElementById('imgPreview').style.display = 'none';
  });

  document.getElementById('btnPublier').addEventListener('click', async function(){
    const texte = document.getElementById('composerTxt').value.trim();
    if(!texte && !selectedPhotoBase64 && !selectedVideoFile){ return; }
    const btn = document.getElementById('btnPublier');
    const busyLabel = editingPostId ? 'Enregistrement…' : 'Publication en cours…';
    btn.textContent = busyLabel; btn.disabled = true;

    let images = selectedPhotoBase64 ? [selectedPhotoBase64] : [];
    let videoUrl = '';

    try{
      if(selectedVideoFile){
        try{
          videoUrl = await uploaderVideo(selectedVideoFile, btn);
        }catch(videoErr){
          console.error('Envoi vidéo impossible :', videoErr);
          showComposerNotice("La vidéo n'a pas pu être envoyée (service temporairement indisponible). La publication continue sans vidéo.", true);
        }
      }

      const journalNom = document.getElementById('composerJournal').value.trim();
      const roleLbl = (currentUserData.role === 'visiteur') ? 'Visiteur' : 'Professionnel';

      if(editingPostId){
        const updateData = { type: selectedType, texte: texte, journalNom: journalNom };
        if(images.length) updateData.images = images;
        if(videoUrl) updateData.videoUrl = videoUrl;
        await updateDoc(doc(db,'fil_presse', editingPostId), updateData);
        editingPostId = null;
      } else {
        await addDoc(collection(db,'fil_presse'), {
          uid: currentUid,
          prenom: currentUserData.prenom || 'Professionnel',
          metier: currentUserData.metier || '',
          photoAvatar: currentUserData.photoAvatar || '',
          roleLbl: roleLbl,
          journalNom: journalNom,
          official: false,
          verifie: true,
          type: selectedType,
          texte: texte,
          images: images,
          videoUrl: videoUrl,
          likes: 0,
          comments: 0,
          deletedAt: null,
          createdAt: serverTimestamp()
        });
      }

      document.getElementById('composerTxt').value = '';
      document.getElementById('composerJournal').value = '';
      document.getElementById('mediaPreview').style.display = 'none';
      selectedPhotoBase64 = null; selectedVideoFile = null;
      window.__closeComposer();
      loadFeed();
    }catch(err){
      console.error('Publication impossible :', err);
      showComposerNotice('La publication a échoué : ' + (err && err.message ? err.message : 'erreur inconnue'), true);
    }finally{
      btn.disabled = false;
      btn.textContent = editingPostId ? 'Enregistrer les modifications' : 'Publier';
    }
  });
}

window.__toggleFollow = async function(targetUid){
  if(!currentUid || targetUid===currentUid) return;
  const relId = currentUid + '_' + targetUid;
  const relRef = doc(db, 'abonnements', relId);
  const snap = await getDoc(relRef);
  const btn = document.getElementById('follow-'+targetUid);
  if(snap.exists()){
    await deleteDoc(relRef);
    if(btn){ btn.classList.remove('on'); btn.textContent = '+ Suivre'; }
  } else {
    await setDoc(relRef, { follower: currentUid, followed: targetUid, createdAt: serverTimestamp() });
    if(btn){ btn.classList.add('on'); btn.textContent = 'Suivi(e)'; }
  }
}

async function markFollowedButtons(){
  if(!currentUid) return;
  const snap = await getDocs(query(collection(db,'abonnements'), where('follower','==',currentUid)));
  snap.forEach(function(d){
    const followed = d.data().followed;
    const btn = document.getElementById('follow-'+followed);
    if(btn){ btn.classList.add('on'); btn.textContent = 'Suivi(e)'; }
  });
}

window.__toggleReactPicker = function(postId){
  const picker = document.getElementById('picker-'+postId);
  if(!picker) return;
  document.querySelectorAll('.react-picker.show').forEach(function(p){ if(p!==picker) p.classList.remove('show'); });
  picker.classList.toggle('show');
}

window.__sendReaction = async function(postId, emoji){
  if(!currentUid){ alert('Connecte-toi pour réagir.'); return; }
  const reactRef = doc(db, 'fil_presse', postId, 'reactions', currentUid);
  const snap = await getDoc(reactRef);
  if(snap.exists() && snap.data().emoji === emoji){
    await deleteDoc(reactRef);
  } else {
    await setDoc(reactRef, { emoji: emoji, uid: currentUid, createdAt: serverTimestamp() });
  }
  document.getElementById('picker-'+postId).classList.remove('show');
  refreshReactionCount(postId);
}

async function refreshReactionCount(postId){
  const snap = await getDocs(collection(db, 'fil_presse', postId, 'reactions'));
  const counts = {};
  snap.forEach(function(d){ const em = d.data().emoji; counts[em] = (counts[em]||0)+1; });
  const top = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,3).join('');
  const total = snap.size;
  const el = document.getElementById('stats-'+postId);
  if(el){
    const spans = el.querySelectorAll('span');
    spans[0].textContent = (top?top+' ':'') + total + ' réaction(s)';
  }
}

window.__toggleComments = async function(postId){
  const box = document.getElementById('comments-'+postId);
  if(!box) return;
  const opening = !box.classList.contains('show');
  box.classList.toggle('show');
  if(opening) await loadComments(postId);
}

async function loadComments(postId){
  const listEl = document.getElementById('cmtList-'+postId);
  listEl.innerHTML = '<div style="font-size:12px;color:#999">Chargement…</div>';
  const snap = await getDocs(query(collection(db,'fil_presse', postId, 'comments'), orderBy('createdAt','asc')));
  if(snap.empty){
    listEl.innerHTML = '<div style="font-size:12px;color:#999">Aucun commentaire pour le moment.</div>';
    return;
  }
  let html = '';
  snap.forEach(function(d){
    const c = d.data();
    const ini = (c.prenom||'?')[0].toUpperCase();
    html += '<div class="cmt-item"><div class="cmt-av">'+ini+'</div><div class="cmt-bubble"><b>'+esc(c.prenom||'Utilisateur')+'</b><br>'+esc(c.texte)+'</div></div>';
  });
  listEl.innerHTML = html;
}

window.__addComment = async function(postId){
  if(!currentUid){ alert('Connecte-toi pour commenter.'); return; }
  const input = document.getElementById('cmtInput-'+postId);
  const texte = input.value.trim();
  if(!texte) return;
  await addDoc(collection(db,'fil_presse', postId, 'comments'), {
    uid: currentUid,
    prenom: (currentUserData && currentUserData.prenom) || 'Utilisateur',
    texte: texte,
    createdAt: serverTimestamp()
  });
  input.value = '';
  await loadComments(postId);
  const postRef = doc(db,'fil_presse', postId);
  const snap = await getDocs(collection(db,'fil_presse', postId, 'comments'));
  await updateDoc(postRef, { comments: snap.size });
  const el = document.getElementById('stats-'+postId);
  if(el){ el.querySelectorAll('span')[1].textContent = snap.size + ' commentaire(s)'; }
}

async function initComposer(){
  const composerBtn = document.getElementById('composerBtn');
  const locked = document.getElementById('composerLocked');
  const isVerified = currentUserData && currentUserData.statut === 'verifie';

  if(!isVerified){
    composerBtn.style.pointerEvents = 'none';
    composerBtn.style.opacity = '0.5';
    locked.style.display = 'block';
    return;
  }
  wireComposerModal();
  composerBtn.onclick = function(){
    window.__openComposer();
  };
}

onAuthStateChanged(auth, async function(user){
  currentUid = user ? user.uid : null;
  if(user){
    try{
      const uSnap = await getDoc(doc(db,'utilisateurs', user.uid));
      currentUserData = uSnap.exists() ? uSnap.data() : {};
    }catch(e){ currentUserData = {}; }
    const av = document.getElementById('myAvatar');
    av.innerHTML = currentUserData.photoAvatar
      ? ('<img src="'+currentUserData.photoAvatar+'">')
      : (currentUserData.prenom||'?')[0].toUpperCase();
  }
  await initComposer();
  try{ await ensureSeed(); }catch(e){ console.error('Seed Fil Presse impossible :', e); }
  try{ await ensureSeedImages(); }catch(e){ console.error('Seed illustré impossible :', e); }
  await loadFeed();
  await markFollowedButtons();
});
</script>
