<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ArtiRoyce – Vitrine</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root { --red: #e63224; --green: #27a945; --navy: #0a0e2e; --border: #ebebeb; --muted: #888; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { font-family: 'Outfit', sans-serif; background: #f5f6f8; max-width: 480px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; z-index: 200;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .h-logo { display: flex; align-items: center; gap: 8px; }
    .h-logo-text { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .h-logo-text .arti { color: var(--red); }
    .h-logo-text .royce { color: var(--green); }

    /* ── FILTRES ── */
    .metiers-wrap {
      position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; z-index: 190;
      background: #fff; border-bottom: 1px solid var(--border);
    }
    .metiers-bar {
      display: flex; overflow-x: auto; gap: 6px;
      padding: 8px 14px 10px; scrollbar-width: none;
    }
    .metiers-bar::-webkit-scrollbar { display: none; }
    .metier-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap;
      cursor: pointer; border: 1.5px solid var(--border);
      background: #fff; color: var(--muted); transition: all .2s; flex-shrink: 0;
    }
    .metier-chip.active { background: var(--red); color: #fff; border-color: var(--red); }

    /* ── SCROLL ── */
    .scroll-area { padding: 118px 14px 80px; }

    /* ── HERO BANNER — FOND BLANC ── */
    .hero-banner {
      background: #fff;
      border-radius: 24px; padding: 22px 20px 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .hero-tag {
      display: inline-block; background: var(--green); color: #fff;
      font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px;
      margin-bottom: 10px; letter-spacing: 0.5px;
    }
    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: 24px; color: #111; line-height: 1.2; margin-bottom: 6px;
    }
    .hero-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; color: #111; border: 2px solid #111; border-radius: 50px;
      padding: 10px 20px; font-size: 13px; font-weight: 700;
      font-family: 'Outfit', sans-serif; cursor: pointer; transition: all .2s;
    }
    .hero-btn:active { background: #111; color: #fff; }

    /* ── SECTION LABEL ── */
    .section-label { font-size: 16px; font-weight: 800; color: #111; margin-bottom: 14px; }

    /* ── CARTE FEATURED ── */
    .card-featured {
      background: #fff; border-radius: 28px;
      overflow: hidden; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* MEDIA BLEU MARINE */
    .featured-media-wrap {
      width: 100%; height: 200px; position: relative; cursor: pointer;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .featured-media-wrap img,
    .featured-media-wrap video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .featured-media-emoji { font-size: 60px; }
    .vid-play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      pointer-events: none;
    }

    .featured-body { padding: 16px; }
    .featured-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    /* AVATAR BLEU MARINE */
    .featured-av {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--navy); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      overflow: hidden; cursor: pointer;
    }
    .featured-av img { width: 100%; height: 100%; object-fit: cover; }

    .featured-info { flex: 1; cursor: pointer; }
    .featured-name { font-size: 15px; font-weight: 800; color: #111; }
    .featured-metier { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge-v {
      background: var(--green); color: #fff;
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px;
      flex-shrink: 0;
    }
    .featured-stats { display: flex; gap: 12px; margin-bottom: 14px; }
    .stat { font-size: 12px; color: var(--muted); font-weight: 600; }
    .stat b { color: #111; }

    /* BOUTONS RONDS BLANCS SIMPLES */
    .featured-btns { display: flex; gap: 8px; }
    .btn-simple {
      flex: 1; padding: 10px 8px; border: 1.5px solid var(--border); border-radius: 50px;
      background: #fff; color: #111; font-size: 12px; font-weight: 700;
      font-family: 'Outfit', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all .2s; white-space: nowrap;
    }
    .btn-simple:active { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-simple.suivi { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── SCROLL HORIZONTAL ── */
    .h-scroll-wrap { margin-bottom: 20px; }
    .h-scroll-label { font-size: 13px; font-weight: 800; color: #111; margin-bottom: 10px; padding: 0 2px; }
    .h-scroll {
      display: flex; gap: 12px; overflow-x: auto;
      padding-bottom: 6px; scroll-snap-type: x mandatory;
    }
    .h-scroll::-webkit-scrollbar { height: 3px; }
    .h-scroll::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

    /* CARTE MINI RONDE */
    .card-mini {
      flex-shrink: 0; width: 162px;
      background: #fff; border-radius: 24px;
      overflow: hidden; scroll-snap-align: start;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      animation: fadeUp .4s ease both;
    }

    /* MEDIA MINI BLEU MARINE */
    .mini-media-wrap {
      width: 100%; height: 120px; position: relative; cursor: pointer;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .mini-media-wrap img,
    .mini-media-wrap video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .mini-media-emoji { font-size: 36px; }
    .mini-vid-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
      pointer-events: none;
    }

    .mini-body { padding: 10px; }
    .mini-av-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }

    /* AVATAR MINI BLEU MARINE */
    .mini-av {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--navy); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff; overflow: hidden;
    }
    .mini-av img { width: 100%; height: 100%; object-fit: cover; }

    .mini-name { font-size: 11px; font-weight: 800; color: #111; line-height: 1.2; }
    .mini-metier { font-size: 10px; color: var(--muted); }
    .mini-bottom { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mini-note { font-size: 11px; font-weight: 700; }
    .mini-badge {
      background: rgba(39,169,69,0.12); color: var(--green);
      font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 8px;
    }
    .btn-mini-suivre {
      width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: 50px;
      background: #fff; color: #111; font-size: 11px; font-weight: 700;
      font-family: 'Outfit', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: all .2s;
    }
    .btn-mini-suivre:active { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-mini-suivre.suivi { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── SKELETON ── */
    .skel {
      background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 24px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── BOTTOM NAV SIMPLE ── */
    .bot-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: #fff;
      border-top: 1px solid var(--border); display: flex; z-index: 200;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.06); padding: 6px 0 12px;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; text-decoration: none; padding: 4px;
      border: none; background: none; font-family: 'Outfit', sans-serif;
    }
    .nav-btn-ico { font-size: 22px; }
    .nav-btn-lb { font-size: 11px; font-weight: 700; color: var(--muted); }
    .nav-btn.active .nav-btn-lb { color: var(--green); }
    .nav-divider { width: 1px; background: var(--border); margin: 8px 0; flex-shrink: 0; }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.82); color: #fff; padding: 9px 20px;
      border-radius: 22px; font-size: 13px; font-weight: 600;
      z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.g { background: var(--green); }
    .toast.r { background: var(--red); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty .e-icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="h-logo">
    <svg width="28" height="20" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
      <path fill="#e02010" fill-rule="evenodd" d="M 90,55 L 68,17 L 24,17 L 2,55 L 24,93 L 68,93 Z M 71,55 L 59,34 L 33,34 L 21,55 L 33,76 L 59,76 Z"/>
      <path fill="#27a945" fill-rule="evenodd" d="M 142,55 L 120,17 L 76,17 L 54,55 L 76,93 L 120,93 Z M 123,55 L 111,34 L 87,34 L 75,55 L 87,76 L 111,76 Z"/>
      <polygon points="68,17 90,55 75,55 87,34" fill="white"/>
      <path fill="#e02010" d="M 68,17 L 90,55 L 71,55 L 59,34 Z"/>
      <polygon points="76,93 54,55 75,55 87,76" fill="white"/>
      <path fill="#27a945" d="M 76,93 L 54,55 L 75,55 L 87,76 Z"/>
    </svg>
    <div class="h-logo-text"><span class="arti">Arti</span><span class="royce">Royce</span></div>
  </div>
</header>

<!-- FILTRES -->
<div class="metiers-wrap">
  <div class="metiers-bar">
    <div class="metier-chip active" data-metier="" onclick="filtrer(this)">⭐ Tous</div>
    <div class="metier-chip" data-metier="maconnerie" onclick="filtrer(this)">🧱 Maçon</div>
    <div class="metier-chip" data-metier="electricite" onclick="filtrer(this)">⚡ Électricien</div>
    <div class="metier-chip" data-metier="plomberie" onclick="filtrer(this)">🚿 Plombier</div>
    <div class="metier-chip" data-metier="peinture" onclick="filtrer(this)">🎨 Peintre</div>
    <div class="metier-chip" data-metier="menuiserie" onclick="filtrer(this)">🪵 Menuisier</div>
    <div class="metier-chip" data-metier="coiffure" onclick="filtrer(this)">✂️ Coiffeur</div>
    <div class="metier-chip" data-metier="couture" onclick="filtrer(this)">🧵 Couturier</div>
    <div class="metier-chip" data-metier="cuisine" onclick="filtrer(this)">👨‍🍳 Cuisinier</div>
    <div class="metier-chip" data-metier="mecanique" onclick="filtrer(this)">🔧 Mécanicien</div>
  </div>
</div>

<!-- CONTENU -->
<main class="scroll-area">

  <!-- HERO FOND BLANC -->
  <div class="hero-banner">
    <div class="hero-tag">✨ Professionnels vérifiés</div>
    <div class="hero-title">Trouvez le professionnel<br><em>qu'il vous faut</em></div>
    <div class="hero-sub">Des centaines de professionnels vérifiés prêts à vous servir</div>
    <button class="hero-btn" onclick="goAccueil()">🔍 Découvrir sur le feed</button>
  </div>

  <div class="section-label">Professionnels vérifiés</div>

  <!-- FEATURED -->
  <div id="featuredWrap">
    <div class="skel" style="height:340px;margin-bottom:20px"></div>
  </div>

  <!-- SCROLL HORIZONTAL -->
  <div class="h-scroll-wrap">
    <div class="h-scroll-label">Autres professionnels</div>
    <div class="h-scroll" id="hScroll">
      <div class="skel" style="width:162px;height:240px;flex-shrink:0"></div>
      <div class="skel" style="width:162px;height:240px;flex-shrink:0"></div>
      <div class="skel" style="width:162px;height:240px;flex-shrink:0"></div>
    </div>
  </div>

</main>

<div class="toast" id="toastEl"></div>

<!-- BOTTOM NAV SIMPLIFIÉ -->
<nav class="bot-nav">
  <button class="nav-btn active" onclick="goAccueil()">
    <span class="nav-btn-ico">🏠</span>
    <span class="nav-btn-lb" style="color:var(--green)">Accueil</span>
  </button>
  <div class="nav-divider"></div>
  <button class="nav-btn" onclick="goProfil()">
    <span class="nav-btn-ico">👤</span>
    <span class="nav-btn-lb">Profil</span>
  </button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBS_6CJN7Fu50pMu98sjuRxQetUcLu9l9w",
  authDomain: "artiroyce-f42e4.firebaseapp.com",
  projectId: "artiroyce-f42e4",
  storageBucket: "artiroyce-f42e4.firebasestorage.app",
  messagingSenderId: "588140774605",
  appId: "1:588140774605:web:b69cf8740c2fe5f1d59584"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let tousUsers = [];

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'connexion.html'; return; }
  currentUser = user;
  charger();
});

const emojiMetier = {
  maconnerie:'🧱', electricite:'⚡', plomberie:'🚿', peinture:'🎨',
  menuiserie:'🪵', coiffure:'✂️', couture:'🧵', cuisine:'👨‍🍳',
  mecanique:'🔧', jardinage:'🌿', informatique:'💻', soudure:'🔩'
};

function getEmoji(m) {
  if (!m) return '🔨';
  const k = m.toLowerCase();
  for (const [key, e] of Object.entries(emojiMetier)) { if (k.includes(key.slice(0,4))) return e; }
  return '🔨';
}

function getNom(u) { return ((u.prenom||'') + ' ' + (u.nom||'')).trim() || 'Professionnel'; }

function getMedia(u) {
  const p = u.portfolio || [];
  if (p.length === 0) return null;
  return p[Math.floor(Math.random() * p.length)];
}

async function charger() {
  try {
    const snap = await getDocs(query(collection(db, 'utilisateurs'), where('statut', '==', 'verifie')));
    tousUsers = [];
    snap.forEach(d => tousUsers.push({ id: d.id, ...d.data() }));
    afficher(tousUsers);
  } catch(e) { showToast('⚠ Erreur chargement', 'r'); }
}

function afficher(users) {
  if (users.length === 0) {
    document.getElementById('featuredWrap').innerHTML = '<div class="empty"><div class="e-icon">📭</div><p>Aucun professionnel pour le moment</p></div>';
    document.getElementById('hScroll').innerHTML = '';
    return;
  }
  renderFeatured(users[0]);
  renderScroll(users.slice(1));
}

function mediaHTML_featured(u) {
  const media = getMedia(u);
  const emoji = getEmoji(u.metier || u.specialite || '');
  if (!media || !media.url) {
    return `<div class="featured-media-wrap"><span class="featured-media-emoji">${emoji}</span></div>`;
  }
  if (media.type === 'video') {
    return `<div class="featured-media-wrap" onclick="goMedia('${u.id}')">
      <video src="${media.url}" muted preload="metadata"></video>
      <div class="vid-play-btn">▶</div>
    </div>`;
  }
  return `<div class="featured-media-wrap" onclick="goMedia('${u.id}')">
    <img src="${media.url}" alt="" onerror="this.parentNode.innerHTML='<span class=featured-media-emoji>${emoji}</span>'"/>
  </div>`;
}

function mediaHTML_mini(u) {
  const media = getMedia(u);
  const emoji = getEmoji(u.metier || u.specialite || '');
  if (!media || !media.url) {
    return `<div class="mini-media-wrap" onclick="goMedia('${u.id}')"><span class="mini-media-emoji">${emoji}</span></div>`;
  }
  if (media.type === 'video') {
    return `<div class="mini-media-wrap" onclick="goMedia('${u.id}')">
      <video src="${media.url}" muted preload="metadata"></video>
      <div class="mini-vid-play">▶</div>
    </div>`;
  }
  return `<div class="mini-media-wrap" onclick="goMedia('${u.id}')">
    <img src="${media.url}" alt="" onerror="this.parentNode.innerHTML='<span class=mini-media-emoji>${emoji}</span>'"/>
  </div>`;
}

function renderFeatured(u) {
  const nom = getNom(u);
  const metier = u.metier || u.specialite || 'Professionnel';
  const emoji = getEmoji(metier);
  const initiale = nom[0].toUpperCase();
  const abonnes = (u.abonnes||[]).length;
  const isSuivi = currentUser && (u.abonnes||[]).includes(currentUser.uid);

  document.getElementById('featuredWrap').innerHTML = `
  <div class="card-featured">
    ${mediaHTML_featured(u)}
    <div class="featured-body">
      <div class="featured-top">
        <div class="featured-av" onclick="goProfil('${u.id}')">
          ${u.photoAvatar ? `<img src="${u.photoAvatar}" alt="${nom}">` : initiale}
        </div>
        <div class="featured-info" onclick="goProfil('${u.id}')">
          <div class="featured-name">${nom}</div>
          <div class="featured-metier">${emoji} ${metier}${u.ville ? ' · 📍 '+u.ville : ''}</div>
        </div>
        <span class="badge-v">✔ Vérifié</span>
      </div>
      <div class="featured-stats">
        <div class="stat">⭐ <b>${u.note||4.8}</b></div>
        <div class="stat">💬 <b>${u.avis||0}</b> avis</div>
        <div class="stat">👥 <b>${abonnes}</b> abonnés</div>
      </div>
      <div class="featured-btns">
        <button class="btn-simple" onclick="goContact('${u.id}')">💬 Contacter</button>
        <button class="btn-simple" onclick="goReserver('${u.id}')">📅 Réserver</button>
        <button class="btn-simple ${isSuivi?'suivi':''}" id="fs_${u.id}" onclick="suivre('${u.id}',this)">
          ${isSuivi ? '✔ Suivi' : '➕ Suivre'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderScroll(users) {
  const scroll = document.getElementById('hScroll');
  if (users.length === 0) {
    scroll.innerHTML = '<div style="color:#aaa;font-size:13px;padding:20px 0">Aucun autre professionnel</div>';
    return;
  }
  scroll.innerHTML = users.map(u => {
    const nom = getNom(u);
    const metier = u.metier || u.specialite || 'Pro';
    const emoji = getEmoji(metier);
    const initiale = nom[0].toUpperCase();
    const isSuivi = currentUser && (u.abonnes||[]).includes(currentUser.uid);
    return `
    <div class="card-mini">
      ${mediaHTML_mini(u)}
      <div class="mini-body">
        <div class="mini-av-row">
          <div class="mini-av">${u.photoAvatar ? `<img src="${u.photoAvatar}" alt="${nom}">` : initiale}</div>
          <div>
            <div class="mini-name">${nom}</div>
            <div class="mini-metier">${emoji} ${metier}</div>
          </div>
        </div>
        <div class="mini-bottom">
          <span class="mini-note">⭐ ${u.note||4.8}</span>
          <span class="mini-badge">✔ Vérifié</span>
        </div>
        <button class="btn-mini-suivre ${isSuivi?'suivi':''}" onclick="event.stopPropagation();suivre('${u.id}',this)">
          ${isSuivi ? '✔ Suivi' : '➕ Suivre'}
        </button>
      </div>
    </div>`;
  }).join('');
}

window.filtrer = function(el) {
  document.querySelectorAll('.metier-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const m = el.dataset.metier;
  const f = m ? tousUsers.filter(u => (u.metier||u.specialite||'').toLowerCase().includes(m.slice(0,4))) : tousUsers;
  afficher(f);
};

window.goAccueil = () => { window.location.href = 'accueil.html'; };
window.goProfil = (uid) => { window.location.href = uid ? 'accueil.html?uid='+uid+'&goto=profil' : 'accueil.html?goto=profil'; };
window.goMedia = (uid) => { window.location.href = 'accueil.html?uid='+uid; };
window.goContact = (uid) => { window.location.href = 'accueil.html?uid='+uid+'&action=contact'; };
window.goReserver = (uid) => { window.location.href = 'accueil.html?uid='+uid+'&action=reserver'; };

window.suivre = async function(uid, btn) {
  if (!currentUser) { showToast('🔐 Connectez-vous', 'r'); return; }
  const suivi = btn.classList.contains('suivi');
  try {
    if (suivi) {
      await updateDoc(doc(db, 'utilisateurs', uid), { abonnes: arrayRemove(currentUser.uid) });
      await updateDoc(doc(db, 'utilisateurs', currentUser.uid), { abonnements: arrayRemove(uid) });
      btn.classList.remove('suivi'); btn.textContent = '➕ Suivre';
    } else {
      await updateDoc(doc(db, 'utilisateurs', uid), { abonnes: arrayUnion(currentUser.uid) });
      await updateDoc(doc(db, 'utilisateurs', currentUser.uid), { abonnements: arrayUnion(uid) });
      btn.classList.add('suivi'); btn.textContent = '✔ Suivi';
      showToast('✅ Vous suivez ce professionnel !', 'g');
    }
  } catch(e) { showToast('⚠ Erreur', 'r'); }
};

function showToast(msg, type) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => el.className = 'toast', 2500);
}
window.showToast = showToast;
</script>
</body>
</html>
