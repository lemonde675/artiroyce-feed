<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtiRoyce</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body{ background:#ffffff; color:#111; }

.top-bar{
  height:10px;
  background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
}
.bottom-bar{
  height:10px;
  background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
}

header{
  padding:16px;
  text-align:center;
}

.logo-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo-text{
  font-size:28px;
  font-weight:800;
  letter-spacing:-0.5px;
}
.logo-text .arti  { color:#e63224; }
.logo-text .royce { color:#27a945; }

.subtitle{
  margin-top:8px;
  font-size:15px;
  font-weight:600;
  color:#111;
}

.menu-wrap{
  margin-top:14px;
  background:#f2f2f2;
  padding:6px;
  border-radius:30px;
}
.menu{ display:flex; justify-content:space-around; }

.menu a{
  padding:8px 10px;
  font-size:13px;
  color:#111;
  font-weight:600;
  text-decoration:none;
  border-radius:20px;
  transition: background 0.18s, color 0.18s;
}

.menu a.active{
  background: #e63224;
  color: #fff;
  font-weight: bold;
}

main{ padding:12px; }
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  position:relative;
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.badge{
  position:absolute;
  top:8px; left:8px;
  background:#1a7a3a;
  color:#fff;
  font-size:11px;
  padding:4px 10px 4px 28px;
  border-radius:14px;
  font-weight:bold;
  letter-spacing:0.3px;
}
.badge .medal{
  position:absolute;
  left:5px;
  top:50%;
  transform:translateY(-50%);
  width:19px;
  height:19px;
  background:#2ecc71;
  clip-path:polygon(50% 0%,61% 15%,79% 9%,79% 27%,97% 35%,88% 50%,97% 65%,79% 73%,79% 91%,61% 85%,50% 100%,39% 85%,21% 91%,21% 73%,3% 65%,12% 50%,3% 35%,21% 27%,21% 9%,39% 15%);
}
.badge .check{
  position:absolute;
  left:9px;
  top:50%;
  transform:translateY(-50%);
  font-size:9px;
  color:#fff;
  font-weight:900;
  line-height:1;
}
.play{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:42px; height:42px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  text-decoration:none;
}
.card-body{ padding:10px; }
.job{ font-weight:bold; font-size:14px; }
.place{ font-size:12px; color:#555; margin-top:3px; }
.stars{ color:#f1c40f; margin-top:4px; font-size:13px; }
</style>
</head>
<body>

<div class="top-bar"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.badge').forEach(function(b){
    b.innerHTML = '<span class="medal"></span><span class="check">✔</span> Vérifié';
  });

  const page = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.menu a').forEach(function(link){
    const href = link.getAttribute('href');
    if(href === page){
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });

  document.querySelectorAll('.menu a').forEach(function(link){
    link.addEventListener('click', function(){
      document.querySelectorAll('.menu a').forEach(function(l){ l.classList.remove('active'); });
      link.classList.add('active');
    });
  });
});
</script>
