<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtiRoyce</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body{ background:#ffffff; color:#111; }

.top-bar{
  height:10px;
  background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
}
.bottom-bar{
  height:10px;
  background: linear-gradient(to right, #e63224 30%, #7a3e15 45%, #27a945 60%);
}

header{
  padding:16px;
  text-align:center;
}

.logo-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo-text{
  font-size:28px;
  font-weight:800;
  letter-spacing:-0.5px;
}
.logo-text .arti  { color:#e63224; }
.logo-text .royce { color:#27a945; }

.subtitle{
  margin-top:8px;
  font-size:15px;
  font-weight:600;
  color:#111;
}

.menu-wrap{
  margin-top:14px;
  background:#f2f2f2;
  padding:6px;
  border-radius:30px;
}
.menu{ display:flex; justify-content:space-around; }

.menu a{
  padding:8px 10px;
  font-size:13px;
  color:#111;
  font-weight:600;
  text-decoration:none;
  border-radius:20px;
  transition: background 0.18s, color 0.18s;
}

.menu a.active{
  background: #e63224;
  color: #fff;
  font-weight: bold;
}

main{ padding:12px; }
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  position:relative;
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.badge{
  position:absolute;
  top:8px; left:8px;
  background:#1a7a3a;
  color:#fff;
  font-size:11px;
  padding:4px 10px 4px 28px;
  border-radius:14px;
  font-weight:bold;
}
.play{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:42px; height:42px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  text-decoration:none;
}
.card-body{ padding:10px; }
.job{ font-weight:bold; font-size:14px; }
.place{ font-size:12px; color:#555; margin-top:3px; }
.stars{ color:#f1c40f; margin-top:4px; font-size:13px; }
</style>
</head>

<body>

<div class="top-bar"></div>

<header>
  <div class="logo-wrap">
    <div class="logo-text">
      <span class="arti">Arti</span><span class="royce">Royce</span>
    </div>
  </div>

  <div class="subtitle">
    Retrouvez les meilleurs indépendants et auto-entrepreneurs du monde
  </div>

  <div class="menu-wrap">
    <nav class="menu">
      <a class="active" href="index.html">Accueil</a>
      <a href="connexion.html">Favoris</a>
      <a href="connexion.html">Connexion</a>
      <a href="enregistrer.html">Inscription</a>
    </nav>
  </div>
</header>

<main>
<section class="grid">

<div class="card">
  <span class="badge">✔ Vérifié</span>
  <img src="https://images.pexels.com/photos/4488640/pexels-photo-4488640.jpeg">
  <a href="connexion.html" class="play">▶</a>
  <div class="card-body">
    <div class="job">Mécanicien auto</div>
    <div class="place">🇫🇷 France — Paris</div>
    <div class="stars">★★★★★</div>
  </div>
</div>

</section>
</main>

<div class="bottom-bar"></div>

</html>
